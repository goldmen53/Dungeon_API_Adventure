<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .log-box { font-family: 'Courier New', Courier, monospace; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 p-4 h-screen flex flex-col">

    <header class="bg-gray-800 p-4 rounded-lg shadow-lg mb-4 flex justify-between items-center border border-gray-700">
        <h1 class="text-2xl font-bold text-yellow-500">🐉 Dungeon Master Console</h1>
        <div class="flex gap-2">
            <input type="text" id="heroName" placeholder="Имя героя" class="px-3 py-1 rounded bg-gray-700 text-white border border-gray-600 focus:outline-none focus:border-yellow-500">
            <button onclick="loadHero()" class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded font-bold transition">Войти</button>
            <button onclick="createHero()" class="bg-green-600 hover:bg-green-500 px-4 py-1 rounded font-bold transition">Создать</button>
        </div>
    </header>

    <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-4 overflow-hidden">
        
        <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 flex flex-col overflow-y-auto">
            <h2 class="text-xl font-bold text-blue-400 border-b border-gray-600 pb-2 mb-2">Статус Героя</h2>
            <pre id="heroStats" class="text-sm text-green-400 bg-gray-900 p-3 rounded mb-4 overflow-x-auto">Загрузите героя...</pre>
            
            <h2 class="text-xl font-bold text-purple-400 border-b border-gray-600 pb-2 mb-2 mt-auto">Карта / Окружение</h2>
            <pre id="mapPreview" class="text-sm text-gray-300 bg-gray-900 p-3 rounded overflow-x-auto">Пусто</pre>
        </div>

        <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 flex flex-col gap-4 overflow-y-auto">
            
            <div class="p-3 bg-gray-700 rounded">
                <h3 class="font-bold text-gray-300 mb-2">Движение (Вперед)</h3>
                <div class="flex gap-2 justify-center">
                    <button onclick="action('move', {target_lane: 0})" class="bg-gray-600 hover:bg-gray-500 px-4 py-2 rounded w-1/3">Влево (0)</button>
                    <button onclick="action('move', {target_lane: 1})" class="bg-gray-600 hover:bg-gray-500 px-4 py-2 rounded w-1/3">Прямо (1)</button>
                    <button onclick="action('move', {target_lane: 2})" class="bg-gray-600 hover:bg-gray-500 px-4 py-2 rounded w-1/3">Вправо (2)</button>
                </div>
            </div>

            <div class="p-3 bg-red-900/30 border border-red-800 rounded">
                <h3 class="font-bold text-red-400 mb-2">Бой и Магия</h3>
                <div class="flex gap-2 mb-2">
                    <button onclick="action('attack')" class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded w-full font-bold">⚔️ Атака мечом</button>
                </div>
                <div class="flex gap-2">
                    <input type="number" id="spellId" placeholder="ID Спелла" class="w-24 px-2 bg-gray-800 rounded border border-gray-600">
                    <button onclick="castSpell()" class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded flex-1 font-bold">✨ Каст (Cast)</button>
                </div>
            </div>

            <div class="p-3 bg-green-900/30 border border-green-800 rounded">
                <h3 class="font-bold text-green-400 mb-2">Взаимодействие</h3>
                <div class="flex gap-2 mb-2">
                    <button onclick="action('rest')" class="bg-green-700 hover:bg-green-600 px-4 py-2 rounded flex-1">⛺ Отдых (-10G)</button>
                    <button onclick="action('shop')" class="bg-yellow-600 hover:bg-yellow-500 px-4 py-2 rounded flex-1">🛒 Магазин</button>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="eventChoice" placeholder="Выбор (1 или 2)" class="w-32 px-2 bg-gray-800 rounded border border-gray-600">
                    <button onclick="resolveEvent()" class="bg-teal-600 hover:bg-teal-500 px-4 py-2 rounded flex-1">🎲 Ивент (Resolve)</button>
                </div>
            </div>

            <div class="p-3 bg-gray-900 border border-gray-700 rounded mt-auto">
                <h3 class="font-bold text-gray-500 mb-2">Чит-панель (Админ)</h3>
                <div class="flex gap-2 mb-2">
                    <input type="number" id="artId" placeholder="ID Арт" class="w-20 px-2 bg-gray-800 rounded text-sm">
                    <button onclick="adminGive('artifact')" class="bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded text-sm w-full">Выдать Артефакт</button>
                </div>
                <div class="flex gap-2">
                    <input type="number" id="adminSpellId" placeholder="ID Спелл" class="w-20 px-2 bg-gray-800 rounded text-sm">
                    <button onclick="adminGive('spell')" class="bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded text-sm w-full">Выдать Спелл</button>
                </div>
            </div>

        </div>

        <div class="bg-black p-4 rounded-lg border border-gray-700 flex flex-col relative">
            <h2 class="text-xl font-bold text-gray-400 border-b border-gray-800 pb-2 mb-2">📜 Лог событий</h2>
            <div id="logConsole" class="log-box flex-1 overflow-y-auto text-sm space-y-2 pb-4">
                <div class="text-gray-500">Система инициализирована...</div>
            </div>
            <button onclick="document.getElementById('logConsole').innerHTML=''" class="absolute top-4 right-4 text-xs text-gray-500 hover:text-white">Очистить</button>
        </div>

    </div>

    <script>
        const API = "http://127.0.0.1:8000";
        let heroData = null;

        // Вспомогательная функция для добавления текста в лог
        function log(message, type = 'info') {
            const consoleBox = document.getElementById('logConsole');
            const colors = { info: 'text-gray-300', success: 'text-green-400', error: 'text-red-400', warning: 'text-yellow-400', magic: 'text-purple-400' };
            const time = new Date().toLocaleTimeString('ru-RU', { hour12: false });
            
            // Если пришел объект, форматируем его
            if (typeof message === 'object') {
                message = JSON.stringify(message, null, 2);
                message = `<pre class="text-xs mt-1 text-gray-500">${message}</pre>`;
            }

            consoleBox.innerHTML += `<div class="${colors[type]}"><span class="text-gray-600">[${time}]</span> ${message}</div>`;
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        // Получить имя из инпута
        function getName() {
            const name = document.getElementById('heroName').value.trim();
            if (!name) log("Укажите имя героя!", "error");
            return name;
        }

        // 1. Создание героя
        async function createHero() {
            const name = getName(); if (!name) return;
            try {
                const res = await fetch(`${API}/heroes/create?name=${encodeURIComponent(name)}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) { log(`Герой ${name} создан!`, "success"); loadHero(); } 
                else { log(data.detail, "error"); }
            } catch (e) { log(e.message, "error"); }
        }

        // 2. Загрузка статуса
        async function loadHero() {
            const name = getName(); if (!name) return;
            try {
                const res = await fetch(`${API}/heroes/${encodeURIComponent(name)}`);
                const data = await res.json();
                if (res.ok) {
                    heroData = data;
                    document.getElementById('heroStats').innerHTML = JSON.stringify(data, null, 2);
                    log(`Данные героя ${name} загружены.`, "info");
                    loadMap(); // Сразу грузим карту
                } else {
                    log(data.detail || "Герой не найден", "error");
                }
            } catch (e) { log(e.message, "error"); }
        }

        // 3. Загрузка карты
        async function loadMap() {
            const name = getName(); if (!name) return;
            try {
                const res = await fetch(`${API}/heroes/${encodeURIComponent(name)}/map`);
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('mapPreview').innerHTML = JSON.stringify(data.map_preview, null, 2);
                }
            } catch (e) {}
        }

        // 4. Универсальная функция для действий (Движение, Отдых, Магазин, Атака)
        async function action(endpoint, queryParams = {}) {
            const name = getName(); if (!name) return;
            
            // Собираем URL
            let url = "";
            if (endpoint === 'attack') url = `${API}/battle/attack?hero_name=${encodeURIComponent(name)}`;
            else if (endpoint === 'shop') url = `${API}/heroes/${encodeURIComponent(name)}/shop`; // Это GET
            else {
                const query = new URLSearchParams(queryParams).toString();
                url = `${API}/heroes/${encodeURIComponent(name)}/${endpoint}${query ? '?'+query : ''}`;
            }

            const method = (endpoint === 'shop') ? 'GET' : 'POST';

            try {
                const res = await fetch(url, { method: method });
                const data = await res.json();
                
                if (res.ok) {
                    if (endpoint === 'attack') log(`Бой: ${data.log[data.log.length-1]}`, "warning");
                    else if (data.message) log(data.message, "success");
                    else log(data, "info");
                } else {
                    log(data.detail, "error");
                }
                loadHero(); // Обновляем статы после любого действия
            } catch (e) { log(e.message, "error"); }
        }

        // 5. Использование магии
        async function castSpell() {
            const name = getName(); if (!name) return;
            const spellId = document.getElementById('spellId').value;
            if (!spellId) { log("Введите ID заклинания", "error"); return; }

            try {
                const res = await fetch(`${API}/heroes/${encodeURIComponent(name)}/cast/${spellId}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) { log(data.message, "magic"); loadHero(); } 
                else { log(data.detail, "error"); }
            } catch (e) { log(e.message, "error"); }
        }

        // 6. Решение ивента
        async function resolveEvent() {
            if (!heroData) { log("Сначала загрузите героя", "error"); return; }
            const choice = document.getElementById('eventChoice').value;
            if (!choice) { log("Введите выбор (например: 1)", "error"); return; }

            try {
                const res = await fetch(`${API}/heroes/${heroData.id}/event/resolve?choice=${choice}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) { log(data.message, "success"); loadHero(); } 
                else { log(data.detail, "error"); }
            } catch (e) { log(e.message, "error"); }
        }

        // 7. Выдача читов (Админ)
        async function adminGive(type) {
            const name = getName(); if (!name) return;
            const idInput = type === 'artifact' ? 'artId' : 'adminSpellId';
            const id = document.getElementById(idInput).value;
            if (!id) { log(`Введите ID для ${type}`, "error"); return; }

            try {
                const res = await fetch(`${API}/admin/give_${type}?hero_name=${encodeURIComponent(name)}&${type}_id=${id}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) { log(data.message, "success"); loadHero(); } 
                else { log(data.detail, "error"); }
            } catch (e) { log(e.message, "error"); }
        }
    </script>
</body>
</html>
