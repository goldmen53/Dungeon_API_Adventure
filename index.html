<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Crawler</title>
    <style>
        /* Базовые настройки и темная тема */
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --border-color: #333;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Главный контейнер игры */
        .game-container {
            /* Ограничение ширины до 1200px и центрирование */
            max-width: 1200px;
            margin: 0 auto;
            height: 100vh;
            
            /* CSS Grid макет */
            display: grid;
            grid-template-columns: 250px 1fr; /* Левая колонка 250px, правая занимает остаток */
            grid-template-rows: 65px 1fr 200px; /* Шапка, Центр, Подвал (Лог) */
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Общие стили для всех панелей */
        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto; /* Скролл, если контент не влезает */
        }

        /* 1. Верхняя панель (Авторизация слева) */
        .top-bar {
            grid-column: 1 / -1; /* Растягиваем на всю ширину сетки */
            display: flex;
            align-items: center;
            justify-content: flex-end; /* Прижимаем кнопки влево */
            gap: 10px;
        }

        button {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        /* 2. Левая панель (Статы) */
        .stats-panel {
            grid-column: 1 / 2;
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            border-bottom: 1px dashed var(--border-color);
        }

        /* 3. Карта (Центр) */
        .map-area {
            grid-column: 2 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #666;
            position: relative;
        }

        /* 4. Лог (Низ) */
        .log-panel {
            grid-column: 1 / -1; /* Растягиваем на всю ширину */
            font-family: 'Courier New', Courier, monospace;
        }

        .log-entry {
            margin-bottom: 5px;
            color: #aaa;
        }
        .log-entry.new {
            color: #fff;
        }

        /* --- АДАПТИВНОСТЬ ДЛЯ МОБИЛОК --- */
        @media (max-width: 768px) {
            .game-container {
                /* Перестраиваем в одну колонку */
                grid-template-columns: 1fr;
                /* Шапка (60px), Карта (40vh), Статы (auto), Лог (остаток) */
                grid-template-rows: 60px 40vh auto 1fr; 
                height: 100vh;
            }

            /* Переназначаем позиции в сетке */
            .top-bar { grid-column: 1; grid-row: 1; }
            .map-area { grid-column: 1; grid-row: 2; }
            .stats-panel { grid-column: 1; grid-row: 3; }
            .log-panel { grid-column: 1; grid-row: 4; }
        }

        /* Стили для модального окна */
        .modal {
            display: none; /* Скрыто по умолчанию */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8); /* Затемнение */
            backdrop-filter: blur(5px); /* Размытие фона */
        }

        .modal-content {
            background-color: var(--panel-bg);
            margin: 15% auto;
            padding: 25px;
            border: 1px solid var(--accent-color);
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 0 20px rgba(187, 134, 252, 0.2);
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--accent-color);
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            background: #2a2a2a;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="game-container">
        
        <header class="top-bar panel">
            <div id="guestBlock">
                <button id="btnLogin">Войти</button>
                <button id="btnRegister">Регистрация</button>
            </div>

            <div id="userBlock" style="display: none; align-items: center; gap: 15px; width: 100%;">
                <span id="playerName" style="font-weight: bold; color: var(--accent-color);">Имя игрока</span>
                <button id="btnLogout" style="background-color: #ff5555; color: white; margin-left: auto;">Выйти</button>
            </div>
        </header>

        

        <aside class="stats-panel panel">
            <h2 style="margin-top: 0;">Герой</h2>
            <div id="statsContent">
                <p>Загрузка данных...</p>
            </div>
        </aside>

        <div id="modalCreateHero" class="modal">
            <div class="modal-content">
                <h2>Создать героя</h2>
                <div class="form-group">
                    <label>Имя героя</label>
                    <input type="text" id="newHeroName" placeholder="Как назовем легенду?">
                </div>
                <button id="btnConfirmCreate" style="width: 100%;">Войти в подземелье</button>
            </div>
        </div>

        <main class="map-area panel">
            <div id="mapContent">
                Здесь будет отрисовываться подземелье...
            </div>
        </main>

        <footer class="log-panel panel">
            <h3 style="margin-top: 0; margin-bottom: 10px;">Журнал событий</h3>
            <div id="logContent">
                <div class="log-entry">Добро пожаловать в подземелье! Пожалуйста, авторизуйтесь.</div>
            </div>
        </footer>

    </div>

    {# Registration window #}
    <div id="modalAuth" class="modal">
    <div class="modal-content">
    <span class="close">&times;</span>
        <h2 id="modalTitle">Регистрация</h2>
    <div id="authMessage" style="margin-bottom: 15px; font-size: 0.9rem; display: none; padding: 10px; border-radius: 4px;"></div>
        <div class="form-group">
            <label>Имя аккаунта</label>
            <input type="text" id="authUsername" placeholder="Введите имя...">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="authPassword" placeholder="Введите пароль...">
        </div>
        <button id="btnSubmitAuth" style="width: 100%; margin-top: 10px;">Подтвердить</button>
    </div>
    </div>

    <script>
        // Здесь мы будем писать логику связи с твоим FastAPI
        const modal = document.getElementById("modalAuth");
        const btnSubmit = document.getElementById("btnSubmitAuth");
        const closeBtn = document.querySelector(".close");


        // 1. Сначала объявляем функции
        function addLog(message) {
            const logContent = document.getElementById('logContent');
            if (!logContent) return; // Защита от ошибок

            const newEntry = document.createElement('div');
            newEntry.className = 'log-entry new';
            newEntry.textContent = `> ${message}`;
            logContent.appendChild(newEntry);
            
            // Прокрутка вниз
            const logPanel = document.querySelector('.log-panel');
            logPanel.scrollTop = logPanel.scrollHeight;
        }


        document.getElementById('btnRegister').addEventListener('click', () => {
            // Теперь addLog точно существует
            addLog("Открытие окна регистрации...");
            document.getElementById('modalTitle').textContent = "Регистрация";
            document.getElementById('authMessage').style.display = 'none';
            modal.style.display = "block";
        });

        // Открытие модалки при нажатии на "Регистрация"
        document.getElementById('btnRegister').addEventListener('click', () => {
            document.getElementById('modalTitle').textContent = "Регистрация";
            modal.style.display = "block";
        });

        // Закрытие при клике на крестик или вне окна
        closeBtn.onclick = () => modal.style.display = "none";
        window.onclick = (event) => {
            if (event.target == modal) modal.style.display = "none";
        }

        // Находим кнопку входа (нам нужно переключать режим модалки)
        document.getElementById('btnLogin').addEventListener('click', () => {
        document.getElementById('modalTitle').textContent = "Вход";
        document.getElementById('authMessage').style.display = 'none';
        modal.style.display = "block";
        });


        // Обновляем обработчик btnSubmit, чтобы он понимал, регистрируемся мы или входим
        btnSubmit.addEventListener('click', async () => {
            const mode = document.getElementById('modalTitle').textContent; // "Вход" или "Регистрация"
            const username = document.getElementById('authUsername').value;
            const password = document.getElementById('authPassword').value;

            if (mode === "Регистрация") {
                // ... твой текущий код для /auth/register ...
            } else {
                // ЛОГИКА ВХОДА
                try {
                    // ВАЖНО: Для /auth/token FastAPI ждет Form Data
                    const formData = new FormData();
                    formData.append('username', username);
                    formData.append('password', password);

                    const response = await fetch('http://127.0.0.1:8000/auth/token', {
                        method: 'POST',
                        body: formData // Не используем JSON.stringify здесь!
                    });

                    const data = await response.json();

                    if (response.ok) {
                        localStorage.setItem('token', data.access_token);
                        localStorage.setItem('username', username); // Сохраняем имя для интерфейса
                        
                        showAuthMessage("Успешный вход!", false);
                        addLog(`Добро пожаловать, ${username}!`);
                        
                        setTimeout(() => {
                            modal.style.display = "none";
                            updateUI(); // Обновляем кнопки в шапке
                        }, 1000);
                    }
                     else {
                        showAuthMessage(data.detail || "Неверный логин или пароль");
                    }
                } catch (error) {
                    console.error(error);
                    showAuthMessage("Сервер недоступен при входе");
                }
            }
        });



        // ФУНКЦИЯ ОТПРАВКИ НА БЭКЕНД
        btnSubmit.addEventListener('click', async () => {
        const username = document.getElementById('authUsername').value;
        const password = document.getElementById('authPassword').value;
        const msgDiv = document.getElementById('authMessage');

        // Очищаем предыдущие сообщения
        msgDiv.style.display = 'none';

        if (!username || !password) {
            showAuthMessage("Заполните все поля!");
            return;
        }

        try {
            const response = await fetch('http://127.0.0.1:8000/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                // УСПЕХ
                showAuthMessage("Аккаунт успешно создан! Войдите.", false);
                // Добавим запись в лог тоже, на память
                addLog(`Аккаунт ${username} зарегистрирован.`);
                
                // Очистим поля ввода
                document.getElementById('authUsername').value = "";
                document.getElementById('authPassword').value = "";
            } else {
                // ОШИБКА (например, "Пользователь уже существует")
                // Берем detail из ответа FastAPI
                const errorText = Array.isArray(data.detail) ? data.detail[0].msg : data.detail;
                showAuthMessage(errorText || "Ошибка регистрации");
            }
        } catch (error) {
            showAuthMessage("Сервер недоступен");
        }
        });

        // Пример добавления записи в лог
        // Функция для вывода сообщений в самой модалке
        function showAuthMessage(text, isError = true) {
        const msgDiv = document.getElementById('authMessage');
        msgDiv.textContent = text;
        msgDiv.style.display = 'block';
        
        // Красный для ошибок, зеленый для успеха
        msgDiv.style.backgroundColor = isError ? 'rgba(255, 85, 85, 0.2)' : 'rgba(85, 255, 85, 0.2)';
        msgDiv.style.color = isError ? '#ff5555' : '#55ff55';
        msgDiv.style.border = `1px solid ${isError ? '#ff5555' : '#55ff55'}`;
        }

        // Привязываем кнопки (пока как заглушки)
        document.getElementById('btnLogin').addEventListener('click', () => {
            addLog('Открываем окно входа...');
        });

        document.getElementById('btnRegister').addEventListener('click', () => {
            addLog('Открываем окно регистрации...');
        });

        function updateUI() {
            
            const token = localStorage.getItem('token');
            const guestBlock = document.getElementById('guestBlock');
            const userBlock = document.getElementById('userBlock');
            const playerNameSpan = document.getElementById('playerName');

            if (token) {
                // Если токен есть — пользователь вошел
                guestBlock.style.display = 'none';
                userBlock.style.display = 'flex';
                
                // Попробуем достать имя пользователя (если ты сохранял его)
                const savedUsername = localStorage.getItem('username');
                playerNameSpan.textContent = savedUsername || "Игрок";
                loadHeroData();
                addLog("Вы авторизованы.");
            } else {
                // Если токена нет — показываем кнопки входа
                guestBlock.style.display = 'block';
                userBlock.style.display = 'none';
            }
        }

        // Логика выхода
        document.getElementById('btnLogout').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            addLog("Вы вышли из аккаунта.");
            updateUI();
            // Здесь можно также очистить статы героя на экране
            location.reload(); // Простой способ сбросить состояние игры
        });

        // Вызываем при запуске страницы
            updateUI();
        // 1. Функция загрузки героя
            async function loadHeroData() {
                const token = localStorage.getItem('token');
                if (!token) return;

                try {
                    const response = await fetch('http://127.0.0.1:8000/heroes/me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.ok) {
                        const hero = await response.json();
                        renderStats(hero);
                        addLog(`Герой ${hero.name} готов к приключениям.`);
                    } else if (response.status === 404) {
                        // Героя нет — показываем кнопку создания
                        document.getElementById('statsContent').innerHTML = `
                            <p>У вас еще нет героя.</p>
                            <button onclick="openCreateHeroModal()" style="width: 100%;">Создать героя</button>
                        `;
                    }
                } catch (error) {
                    console.error("Ошибка загрузки героя:", error);
                }
            }

            // 2. Функция отрисовки статов
            function renderStats(hero) {
                    const content = document.getElementById('statsContent');
                    
                    // Используем точные названия из твоего HeroRead
                    content.innerHTML = `
                        <div class="stat-line"><span>Имя:</span> <b>${hero.name}</b></div>
                        <div class="stat-line"><span>Уровень:</span> <span>${hero.level}</span></div>
                        <div class="stat-line"><span>HP:</span> <span style="color: #ff5555;">${hero.hp}/${hero.max_hp}</span></div>
                        <div class="stat-line"><span>Золото:</span> <span style="color: #ffd700;">${hero.gold}</span></div>
                        
                        <div style="margin-top:10px; border-top: 1px solid #444; padding-top:50px;">
                            <div class="stat-line"><span>Сила:</span> <span>${hero.total_strength}</span></div>
                            <div class="stat-line"><span>Ловкость:</span> <span>${hero.total_dexterity}</span></div>
                            <div class="stat-line"><span>Интеллект:</span> <span>${hero.total_intelligence}</span></div>
                            <div class="stat-line"><span>Уворот:</span> <span>${hero.total_flee}</span></div>
                            <div class="stat-line"><span>Крит:</span> <span>${hero.total_crit}%</span></div>
                        </div>
                    `;
                }

            // 3. Открытие модалки создания
            function openCreateHeroModal() {
                document.getElementById('modalCreateHero').style.display = 'block';
            }

            // 4. Отправка запроса на создание на бэкенд
            document.getElementById('btnConfirmCreate').addEventListener('click', async () => {
                const name = document.getElementById('newHeroName').value;
                const token = localStorage.getItem('token');

                if (!name) return alert("Введите имя!");

                try {
                    // Передаем name как query параметр, так как в твоем FastAPI эндпоинте это простая строка
                    const response = await fetch(`http://127.0.0.1:8000/heroes/create?name=${encodeURIComponent(name)}`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.ok) {
                        document.getElementById('modalCreateHero').style.display = 'none';
                        addLog(`Герой ${name} создан!`);
                        loadHeroData(); // Перезагружаем статы
                    } else {
                        const data = await response.json();
                        alert(data.detail || "Ошибка при создании");
                    }
                } catch (error) {
                    alert("Сервер недоступен");
                }
            });

    </script>
</body>
</html>
